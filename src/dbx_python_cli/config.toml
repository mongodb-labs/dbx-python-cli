# DBX Python CLI Configuration
# This is the default configuration file.
# Copy this to ~/.config/dbx-python-cli/config.toml and customize as needed.

# Default environment variables for Django projects
[project.default_env]
# MONGODB_URI: If not set, will automatically start MongoDB based on mongodb_backend setting
# Uncomment and set this if you have MongoDB running elsewhere:
# MONGODB_URI = "mongodb://localhost:27017"

# MongoDB backend configuration
[project.mongodb]
# Choose which MongoDB backend to use when MONGODB_URI is not set:
# - "runner": Uses npx mongodb-runner (default, standard MongoDB)
# - "docker": Uses Docker with official MongoDB images
# - "atlas-local": Uses Docker with mongodb/mongodb-atlas-local image (includes Atlas Search & Vector Search)
backend = "runner"

# MongoDB edition (applies to both runner and docker backends)
# - "community": MongoDB Community Server (default, free)
# - "enterprise": MongoDB Enterprise Server (requires license)
edition = "community"

# runner configuration (only used when backend = "runner")
[project.mongodb.runner]
# Topology type: "standalone", "replset", or "sharded"
topology = "standalone"
# Number of shards (only for sharded topology)
# shards = 2
# Number of secondaries per replica set (for replset and sharded topologies)
# secondaries = 2
# Number of arbiters per replica set (for replset and sharded topologies)
# arbiters = 0
# Additional options to pass to mongodb-runner start
# options = []

# Docker configuration (only used when backend = "docker")
[project.mongodb.docker]
# Docker image to use (edition setting above determines community vs enterprise)
# When edition = "community":
#   - Default: "mongodb/mongodb-community-server"
#   - Alternative: "mongo" (Docker Official Image)
# When edition = "enterprise":
#   - Default: "mongodb/mongodb-enterprise-server"
# You can override by setting image explicitly:
# image = "mongo"
# Image tag (e.g., "latest", "8.0", "7.0", or specific version)
tag = "latest"
# Container name
container_name = "dbx-mongodb"
# Port to expose MongoDB on
port = 27017
# Replica set name (set this to run as a replica set instead of standalone)
# replset = "rs0"
# Additional docker run options (optional)
# docker_options = ["--rm"]  # Uncomment to auto-remove container on stop

# Atlas Local configuration (only used when backend = "atlas-local")
[project.mongodb.atlas_local]
# Docker image to use
image = "mongodb/mongodb-atlas-local"
# Image tag (e.g., "latest", "8.0", "7.0", "preview", or specific version like "8.0.17-20260218T161908Z")
tag = "latest"
# Container name
container_name = "dbx-atlas-local"
# Port to expose MongoDB on
port = 27017
# Additional docker run options (optional)
# docker_options = ["--rm"]  # Uncomment to auto-remove container on stop

[repo]
base_dir = "~/Developer/mongodb"
fork_user = "aclark4life"  # Change to your GitHub username for fork operations
# Default Python version for virtual environments (can be overridden per group)
python_version = "3.13"
# Repos in these groups are installed into every other group's venv automatically
global_groups = ["global"]
# Priority ordering for groups when a repo exists in multiple groups
# Higher priority groups are preferred when running commands without -g flag
# Groups not listed have equal lower priority
group_priority = ["mongo-python-driver", "django", "langchain"]
# Set to true if repos live directly under base_dir instead of base_dir/<group>/<repo>
flat = true
# Default editor for all repos (can be overridden per group or per repo)
editor = "vii"

[repo.groups.global]
repos = [
    "git@github.com:mongodb/mongo-python-driver.git",
]

# Environment variables for test runs
# You can use {base_dir} placeholder; {group} resolves to "global" for repos in this group
[repo.groups.global.test_env]
mongo-python-driver = { DRIVERS_TOOLS = "{base_dir}/mongo-python-driver/drivers-evergreen-tools", USE_ACTIVE_VENV = "1", COVERAGE = "1" }

# Default extras to install automatically
[repo.groups.global.install_extras]
mongo-python-driver = ["test"]

[repo.groups.mongo-python-driver]
# Python version for the group's virtual environment
python_version = "3.13"
repos = [
    "git@github.com:mongodb/specifications.git",
    "git@github.com:mongodb-labs/drivers-evergreen-tools.git",
    "git@github.com:mongodb-labs/drivers-github-tools.git",
    "git@github.com:mongodb-labs/mongo-arrow.git",
    "git@github.com:mongodb/mongo-orchestration.git",
]

# Build commands: specify commands to run before installing (e.g., rust builds)
# Note: Rust build only works when the rust branch is checked out
# [repo.groups.mongo-python-driver.build_commands]
# mongo-python-driver = [
#     "cd bson/_rbson && maturin build --release",
# ]

[repo.groups.langchain]
repos = [
    "git@github.com:mongodb-labs/pymongo-search-utils.git",
    "git@github.com:mongodb-labs/ai-ml-pipeline-testing.git",
    "git@github.com:langchain-ai/langchain-mongodb.git",
]

# Sub-directory configuration: specify install directories for repos with multiple packages
[repo.groups.langchain.install_dirs]
langchain-mongodb = [
    "libs/langchain-mongodb/",
    "libs/langgraph-checkpoint-mongodb/",
    "libs/langgraph-store-mongodb/",
]

# Default dependency groups to install automatically (e.g., always install dev group)
[repo.groups.langchain.install_groups]
langchain-mongodb = ["dev"]

[repo.groups.django]
# Python version for the group's virtual environment (requires Python >= 3.12 for django-mongodb-backend)
python_version = "3.13"
repos = [
    "git@github.com:mongodb-forks/django.git",
    "git@github.com:mongodb-labs/django-mongodb-backend.git",
    "git@github.com:mongodb-labs/django-mongodb-extensions.git",
    "git@github.com:mongodb/libmongocrypt.git",
    "git@github.com:aclark4life/medical-records.git",
]

# Install directories: specify install directories for repos where the package is not at the root
[repo.groups.django.install_dirs]
libmongocrypt = [
    "bindings/python/",
]

# Build commands: specify commands to run before installing (e.g., cmake builds)
[repo.groups.django.build_commands]
libmongocrypt = [
    "mkdir -p cmake-build",
    "cd cmake-build && cmake ..",
    "cd cmake-build && make",
]

# Custom test runner configuration: specify test runner script for repos that don't use pytest
[repo.groups.django.test_runner]
django = "tests/runtests.py"

# Default arguments passed to the custom test runner
[repo.groups.django.test_runner_args]
django = ["-v", "2"]

# Preferred branch to switch to after cloning (runs `git switch <branch>` automatically)
[repo.groups.django.preferred_branch]
django = "mongodb-6.0.x"

# Environment variables for test runs
# Set the path to your libmongocrypt build for Queryable Encryption support
[repo.groups.django.test_env]
PYMONGOCRYPT_LIB = "~/Developer/mongodb/django/libmongocrypt/cmake-build/libmongocrypt.dylib"
CRYPT_SHARED_LIB_PATH = "~/Downloads/mongo_crypt_shared_v1-macos-arm64-enterprise-8.2.5/lib/mongo_crypt_v1.dylib"

[repo.groups.django-3p]
# Python version for the group's virtual environment
python_version = "3.13"
repos = [
    "git@github.com:django/django.git",
    "git@github.com:mongodb-labs/django-mongodb-backend.git",
    "git@github.com:pennersr/django-allauth.git",
    "git@github.com:encode/django-rest-framework.git",
    "git@github.com:jazzband/django-taggit.git",
    "git@github.com:jazzband/django-debug-toolbar.git",
    "git@github.com:wagtail/wagtail.git",
]
