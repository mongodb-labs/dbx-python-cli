# DBX Python CLI Configuration
# This is the default configuration file.
# Copy this to ~/.config/dbx-python-cli/config.toml and customize as needed.

# Default environment variables for Django projects
[project.default_env]
# MONGODB_URI: If not set, mongodb-runner will automatically start MongoDB
# Uncomment and set this if you have MongoDB running elsewhere:
# MONGODB_URI = "mongodb://localhost:27017"

# Set the path to your libmongocrypt build for Queryable Encryption support
# PYMONGOCRYPT_LIB = "~/Developer/mongodb/django/libmongocrypt/cmake-build/libmongocrypt.dylib"
# CRYPT_SHARED_LIB_PATH = "~/Downloads/mongo_crypt_shared_v1-macos-arm64-enterprise-8.2.5/lib/mongo_crypt_v1.dylib"

[repo]
base_dir = "~/Developer/mongodb"
fork_user = "aclark4life"  # Change to your GitHub username for fork operations
# Repos in these groups are installed into every other group's venv automatically
global_groups = ["global"]

[repo.groups.global]
repos = [
    "git@github.com:mongodb/mongo-python-driver.git",
]

# Environment variables for test runs
# You can use {base_dir} placeholder; {group} resolves to "global" for repos in this group
[repo.groups.global.test_env]
mongo-python-driver = { DRIVERS_TOOLS = "{base_dir}/pymongo/drivers-evergreen-tools", USE_ACTIVE_VENV = "1" }

# Default extras to install automatically
[repo.groups.global.install_extras]
mongo-python-driver = ["test"]

[repo.groups.pymongo]
repos = [
    "git@github.com:mongodb/specifications.git",
    "git@github.com:mongodb-labs/drivers-evergreen-tools.git",
    "git@github.com:mongodb-labs/mongo-arrow.git",
]

# Build commands: specify commands to run before installing (e.g., rust builds)
# Note: Rust build only works when the rust branch is checked out
# [repo.groups.pymongo.build_commands]
# mongo-python-driver = [
#     "cd bson/_rbson && maturin build --release",
# ]

[repo.groups.langchain]
repos = [
    "git@github.com:mongodb-labs/pymongo-search-utils.git",
    "git@github.com:mongodb-labs/ai-ml-pipeline-testing.git",
    "git@github.com:langchain-ai/langchain-mongodb.git",
]

# Sub-directory configuration: specify install directories for repos with multiple packages
[repo.groups.langchain.install_dirs]
langchain-mongodb = [
    "libs/langchain-mongodb/",
    "libs/langgraph-checkpoint-mongodb/",
    "libs/langgraph-store-mongodb/",
]

# Default dependency groups to install automatically (e.g., always install dev group)
[repo.groups.langchain.install_groups]
langchain-mongodb = ["dev"]

[repo.groups.django]
repos = [
    "git@github.com:mongodb-forks/django.git",
    "git@github.com:mongodb-labs/django-mongodb-backend.git",
    "git@github.com:mongodb-labs/django-mongodb-extensions.git",
    "git@github.com:mongodb/libmongocrypt.git",
    "git@github.com:aclark4life/medical-records.git",
]

# Install directories: specify install directories for repos where the package is not at the root
[repo.groups.django.install_dirs]
libmongocrypt = [
    "bindings/python/",
]

# Build commands: specify commands to run before installing (e.g., cmake builds)
[repo.groups.django.build_commands]
libmongocrypt = [
    "mkdir -p cmake-build",
    "cd cmake-build && cmake ..",
    "cd cmake-build && make",
]

# Custom test runner configuration: specify test runner script for repos that don't use pytest
[repo.groups.django.test_runner]
django = "tests/runtests.py"

# Default arguments passed to the custom test runner
[repo.groups.django.test_runner_args]
django = ["-v", "2"]

# Preferred branch to switch to after cloning (runs `git switch <branch>` automatically)
[repo.groups.django.preferred_branch]
django = "mongodb-6.0.x"

[repo.groups.django-3p]
repos = [
    "git@github.com:django/django.git",
    "git@github.com:mongodb-labs/django-mongodb-backend.git",
    "git@github.com:pennersr/django-allauth.git",
    "git@github.com:encode/django-rest-framework.git",
    "git@github.com:jazzband/django-taggit.git",
    "git@github.com:jazzband/django-debug-toolbar.git",
    "git@github.com:wagtail/wagtail.git",
]
